[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bindscore"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "requests",
    "biopython",
    "numpy",
    "freesasa",
    "streamlit", 
    "matplotlib",
    "streamlit_ketcher", 
    "stmol", 
    "py3Dmol", 
    "mols2grid", 
    "scipy", 
    "plotly"
]

[tool.hatch.build.targets.wheel]
packages = ["src/bindscore"]
