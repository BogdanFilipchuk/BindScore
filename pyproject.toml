[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bindscore"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "requests",
    "biopython",
    "numpy",
    "freesasa",
    "pymol-open-source",
    "pathlib",
    "openmm"
]

[tool.hatch.build.targets.wheel]
packages = ["src/bindscore"]
